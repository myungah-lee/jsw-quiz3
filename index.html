            { c: 3, d: 3, a: 'O', q: '과학적 관리론과 인간관계론은 접근법은 다르지만 조직의 생산성 향상을 목표로 한 점은 같다.', e: '둘 다 관리자 입장에서 효율성을 추구한 관리 이론입니다.' },
            { c: 3, d: 2, a: 'O', q: '윌슨의 논문은 행정학이 정치학으로부터 독립된 학문으로 인정받는 계기가 되었다.', e: '미국 행정학의 출발점으로 평가받습니다.' },
            { c: 3, d: 1, a: 'O', q: '엽관주의는 공무원 임용 시 능력보다 선거에서의 기여도나 정당 충성도를 기준으로 삼는다.', e: '선거 승리 정당이 관직을 전리품처럼 배분하는 제도입니다.' },
            { c: 3, d: 2, a: 'O', q: '미국의 진보주의 운동은 엽관주의를 타파하고 행정의 전문성을 높이려는 개혁 운동이었다.', e: '실적주의와 정치-행정 이원론의 배경이 되었습니다.' },
            { c: 3, d: 2, a: 'O', q: 'POSDCORB에서 CO는 부서 간의 업무를 엮어주는 Coordination(조정)을 뜻한다.', e: '업무의 조화로운 연계를 의미합니다.' },
            { c: 3, d: 1, a: 'O', q: 'POSDCORB에서 예산을 편성하고 통제하는 기능은 B(Budgeting)에 해당한다.', e: '예산 기능을 뜻합니다.' },
            { c: 3, d: 2, a: 'X', q: '초기 미국 행정학은 행정의 본질을 가치 판단과 고도의 정책 결정 기능으로 보았다.', e: '결정된 정책을 능률적으로 집행하는 기술적 관리로 보았습니다.' },
            { c: 3, d: 2, a: 'X', q: '테일러의 과학적 관리론은 작업자의 감정이나 사회적 소속감을 극대화하는 데 초점을 맞추었다.', e: '감정을 중시한 것은 인간관계론입니다.' },
            { c: 3, d: 1, a: 'O', q: '인간관계론은 인간을 기계 부품이 아닌 복잡한 감정을 지닌 사회적 존재로 보았다.', e: '인간적이고 감정적인 유인의 중요성을 강조했습니다.' },
            { c: 3, d: 2, a: 'O', q: '정치-행정 이원론은 공무원의 정치적 중립성을 옹호하는 이론적 배경이 되었다.', e: '정치적 간섭 배제가 중립성 확보로 이어집니다.' },
            { c: 3, d: 2, a: 'O', q: '과학적 관리론은 성과급 제도를 통해 작업자의 동기를 유발할 수 있다고 주장했다.', e: '경제적 인간관을 바탕으로 차별적 성과급을 강조했습니다.' },

            // 제4장 (61~95)
            { c: 4, d: 1, a: 'X', q: '대공황을 극복하기 위해 루즈벨트 대통령이 추진한 뉴딜 정책은 작은 정부를 지향했다.', e: '정부의 적극적 개입과 역할을 확대한 큰 정부의 상징입니다.' },
            { c: 4, d: 2, a: 'O', q: '뉴딜 정책의 3R 기조는 Recovery(회복), Reform(개혁), Relief(구제)를 의미한다.', e: '경제 위기 극복을 위한 정부의 세 가지 핵심 방향입니다.' },
            { c: 4, d: 3, a: 'O', q: '뉴딜 정책 이후 행정은 단순 집행을 넘어 스스로 정책을 결정하는 일원론적 성격으로 변했다.', e: '위기 상황에서 행정부의 전문적이고 신속한 결정이 필요해졌습니다.' },
            { c: 4, d: 2, a: 'X', q: '사이먼(Simon)의 행태주의는 행정학 연구에서 가치와 사실을 융합하여 연구해야 한다고 주장했다.', e: '가치와 사실을 엄격히 분리하고, 객관적인 사실만을 연구 대상으로 삼았습니다.' },
            { c: 4, d: 3, a: 'X', q: '사이먼은 인간이 완벽한 정보를 바탕으로 최적의 대안을 찾는 완전한 합리성을 가졌다고 전제했다.', e: '인간의 인지적 제약을 인정하는 제한된 합리성을 전제했습니다.' },
            { c: 4, d: 1, a: 'O', q: '신행정학(NPA)은 1960년대 미국의 극심한 사회 문제(빈곤, 흑인 폭동 등)를 해결하기 위해 등장했다.', e: '기존 행정학의 무능력을 비판하며 현실 참여를 촉구했습니다.' },
            { c: 4, d: 3, a: 'X', q: '왈도가 주도한 민노브룩 회의는 행태주의를 적극 지지하며 신행정학의 태동을 막았다.', e: '오히려 행태주의를 비판하며 신행정학을 탄생시킨 기념비적 회의입니다.' },
            { c: 4, d: 2, a: 'X', q: '신행정학(NPA)은 행정의 최고 가치로 기계적 능률성을 내세웠다.', e: '능률성 대신 사회적 형평성과 약자 보호를 최고 가치로 강조했습니다.' },
            { c: 4, d: 2, a: 'O', q: '신행정학은 학문이 실제 사회 문제 해결에 도움을 주어야 한다는 실천성(Relevance)을 강조했다.', e: '상아탑에 갇히지 않고 현실 문제에 처방을 내려야 한다고 보았습니다.' },
            { c: 4, d: 2, a: 'O', q: '존슨 행정부의 위대한 사회 프로그램은 빈곤 퇴치와 인권 보장을 위한 대규모 복지 정책이었다.', e: '큰 정부와 복지 국가의 정점을 보여주는 사례입니다.' },
            { c: 4, d: 2, a: 'O', q: '공공선택론은 공공 부문을 하나의 시장으로 보고, 관료도 자기 이익을 극대화하려는 존재로 가정한다.', e: '경제학의 합리적 인간 가정을 행정학에 도입했습니다.' },
            { c: 4, d: 3, a: 'O', q: '공공선택론은 서비스의 효율성을 높이기 위해 독점보다는 기관 간의 경쟁을 도입해야 한다고 주장한다.', e: '경쟁이 시민(소비자)에게 이익을 가져다준다고 보았습니다.' },
            { c: 4, d: 3, a: 'X', q: '공공선택론에 따르면 관료들은 국가 이익을 최우선으로 생각하여 예산을 삭감하려 한다.', e: '관료들도 자신의 권력을 위해 부서 예산을 극대화하려 한다고 비판했습니다.' },
            { c: 4, d: 1, a: 'O', q: '신공공관리론(NPM)은 정부 실패를 극복하기 위해 정부에 기업가적 마인드를 도입하자는 이론이다.', e: '작고 효율적이며 성과를 중시하는 정부를 지향합니다.' },
            { c: 4, d: 3, a: 'X', q: 'NPM은 방향 잡기(Steering) 기능보다 서비스를 직접 제공하는 노 젓기(Rowing)를 정부의 핵심으로 본다.', e: '집행(노 젓기)은 민간에 넘기고 정부는 방향 잡기(정책 결정)에 집중하라는 것입니다.' },
            { c: 4, d: 2, a: 'O', q: '오스본과 개블러의 정부 재창조론은 신공공관리론(NPM)의 철학을 대변한다.', e: '기업가적 정부의 원칙을 제시하며 큰 반향을 일으켰습니다.' },
            { c: 4, d: 2, a: 'O', q: '신공공관리론(NPM)은 투입이나 규칙 준수보다는 결과(Result)와 성과를 중심으로 조직을 관리한다.', e: '절차보다 산출된 성과에 책임을 묻습니다.' },
            { c: 4, d: 2, a: 'X', q: '거버넌스 이론은 정부가 시장과 시민사회 위에 군림하는 수직적 통제를 이상적으로 여긴다.', e: '정부, 시장, 시민이 협력하는 수평적 네트워크를 중시합니다.' },
            { c: 4, d: 1, a: 'O', q: '거버넌스 시대에는 공공 서비스 생산을 정부가 독점하지 않고 시민과 공동생산하기도 한다.', e: '자율방범대 등 시민의 적극적 참여가 예시입니다.' },
            { c: 4, d: 3, a: 'O', q: '거버넌스 구조에서는 다양한 주체가 개입하여 문제 발생 시 책임 소재가 불명확해질 위험이 있다.', e: '네트워크 체제의 주요 단점 중 하나입니다.' },
            { c: 4, d: 2, a: 'O', q: '신공공관리론(NPM)은 민영화, 외주화 등을 통해 정부 규모를 축소하려는 경향을 보인다.', e: '시장의 원리를 활용하여 효율성을 높이려 합니다.' },
            { c: 4, d: 2, a: 'X', q: '행태주의는 인간의 내면적 가치관이나 의도를 주요 관찰 대상으로 삼았다.', e: '행태주의는 겉으로 관찰 가능한 객관적 사실(행태)만을 연구 대상으로 삼았습니다.' },
            { c: 4, d: 2, a: 'O', q: '대공황과 뉴딜 정책은 행정이 집행만 하던 이원론에서 정책을 결정하는 일원론으로 변하는 배경이 되었다.', e: '행정의 적극적 역할이 필수적인 시대가 되었습니다.' },
            { c: 4, d: 3, a: 'X', q: '신행정학(NPA)은 행태주의의 논리실증주의를 계승하여 더욱 엄밀한 통계 분석을 추구했다.', e: '신행정학은 행태주의의 가치 중립성을 비판하며 현실 참여를 주장했습니다.' },
            { c: 4, d: 2, a: 'O', q: 'NPM과 거버넌스는 모두 큰 정부의 정부 실패 현상을 극복하기 위한 대안으로 등장했다.', e: '비효율적인 관료제 모델을 대체하려는 시대적 흐름입니다.' },
            { c: 4, d: 3, a: 'X', q: '공공선택론은 정부를 시민들에게 공공재를 독점적으로 공급하는 단일한 유기체로 보는 것을 선호한다.', e: '독점을 비판하며 공급자 간의 경쟁을 강조합니다.' },
            { c: 4, d: 2, a: 'O', q: 'NPM에서 강조하는 고객 지향적 행정은 관료 중심이 아닌 시민 중심의 서비스 제공을 뜻한다.', e: '시민을 왕(고객)처럼 대우해야 한다는 원칙입니다.' },
            { c: 4, d: 3, a: 'O', q: '거버넌스 체제에서는 참여자 간의 명령과 복종보다는 신뢰(Trust)를 기반으로 한 조정이 더 중요하다.', e: '수평적 네트워크의 유지 기반은 상호 신뢰입니다.' },
            { c: 4, d: 2, a: 'X', q: '공공선택론은 인간을 이타적 존재로 가정하여 경제학의 시각을 완전히 배제했다.', e: '경제학의 합리적이고 이기적인 경제인 가정을 그대로 행정학에 도입했습니다.' },
            { c: 4, d: 2, a: 'O', q: '뉴딜 시기에는 의회가 복잡한 사회 문제에 대응할 법을 제때 못 만들어 행정부의 역할이 커졌다.', e: '행정 국가화 현상의 주요 원인입니다.' },
            { c: 4, d: 2, a: 'O', q: '신행정학 학자들은 관료들이 소외계층을 대변하기 위해 적극적인 역할을 해야 한다고 주장했다.', e: '사회적 형평성을 위한 주도적 행정을 요구했습니다.' },
            { c: 4, d: 2, a: 'O', q: '행태주의 연구는 컴퓨터의 발달과 함께 대량의 데이터를 통계적으로 분석하는 데 기여했다.', e: '실증적 데이터를 중시했기 때문입니다.' },
            { c: 4, d: 2, a: 'O', q: 'NPM의 기업가적 정부는 지출 통제에만 머물지 않고 수익을 창출하는 방안도 고민한다.', e: '혁신적인 마인드를 요구합니다.' },
            { c: 4, d: 2, a: 'O', q: '1970년대 오일쇼크는 큰 정부의 재정 악화를 초래하여 NPM 등 개혁의 계기가 되었다.', e: '경제 위기가 정부 축소론을 불렀습니다.' },
            { c: 4, d: 1, a: 'O', q: '공동생산(Coproduction)은 시민이 서비스 제공 과정에 동참하는 주체가 되는 것을 뜻한다.', e: '행정의 객체에서 주체로의 변화입니다.' },

            // 제5장 (96~120)
            { c: 5, d: 1, a: 'O', q: '베버가 제시한 근대적 관료제는 합법적이고 합리적인 권위에 기초하여 운영된다.', e: '전통이나 카리스마가 아닌 법규에 의한 통치가 핵심입니다.' },
            { c: 5, d: 1, a: 'O', q: '관료제 조직은 업무의 효율성을 높이기 위해 고도의 전문화(분업) 원리를 적용한다.', e: '업무를 세분화하여 전문성을 극대화합니다.' },
            { c: 5, d: 1, a: 'O', q: '관료제 조직의 구조는 평등한 형태가 아니라 명령과 복종의 계층제(Hierarchy) 형태를 띤다.', e: '엄격한 상하 지휘 체계를 갖습니다.' },
            { c: 5, d: 2, a: 'X', q: '관료제는 업무 처리 시 개인적 감정이나 친분을 적극 반영하여 유연하게 결정하는 것을 원칙으로 한다.', e: '사적 감정을 배제하는 비정의성(Impersonality)이 원칙입니다.' },
            { c: 5, d: 2, a: 'O', q: '관료제의 모든 업무 처리는 책임 소재를 명확히 하기 위해 문서(문서주의)를 통해 이루어지는 것이 원칙이다.', e: '공식적이고 영구적인 기록을 중시합니다.' },
            { c: 5, d: 3, a: 'X', q: '관료제는 환경이 급변하고 불확실성이 높은 현대 정보화 사회에 가장 완벽하게 적응하는 조직이다.', e: '계층제와 규칙 중심의 경직성 때문에 급변하는 환경 대처에 취약합니다.' },
            { c: 5, d: 2, a: 'O', q: '번문욕례(Red Tape)는 목표 달성보다 문서 양식이나 복잡한 절차에 지나치게 집착하는 관료제의 역기능이다.', e: '대표적인 관료주의의 폐해입니다.' },
            { c: 5, d: 2, a: 'O', q: '목표의 전환 현상은 수단인 규칙 준수가 조직의 본래 목표보다 더 중요해지는 병리 현상이다.', e: '규칙 집착으로 시민 서비스라는 본질을 잃는 현상입니다.' },
            { c: 5, d: 3, a: 'O', q: '훈련된 무능은 관료가 자기 분야의 일만 하다 좁은 시야를 갖게 되어 다른 분야를 이해하지 못하는 현상이다.', e: '타 부서와의 소통을 저해하는 요인이 됩니다.' },
            { c: 5, d: 3, a: 'X', q: '베버는 관료제가 정부와 같은 공공 부문에서만 나타나는 특수한 현상이라고 보았다.', e: '기업, 군대 등 모든 거대 조직에서 나타나는 보편적 현상으로 보았습니다.' },

            { c: 6, d: 3, a: 'X', q: '우리나라 지자체의 재정 자립도는 자체 지방세만으로 예산의 100%를 충당할 수 있을 만큼 매우 높다.', e: '평균 50% 미만으로 중앙정부 의존도가 높습니다.' },
            { c: 6, d: 3, a: 'X', q: '우리나라는 중앙의 권한이 지방에 완전히 이양된 완벽한 연방제 국가이다.', e: '우리나라는 중앙집권적 성격이 있는 단일국가 체제입니다.' },

            // 제7장 (136~150)
            { c: 7, d: 2, a: 'O', q: '동기부여의 내용 이론은 사람 내면에 있는 무엇(What)이 동기를 유발하는지 욕구의 종류에 초점을 맞춘다.', e: '매슬로, 허즈버그 등의 이론이 여기에 속합니다.' },
            { c: 7, d: 2, a: 'O', q: '동기부여의 과정 이론은 사람이 어떠한 심리적 과정(How)을 거쳐 행동을 결정하는지를 설명한다.', e: '브룸의 기대이론이 대표적입니다.' },
            { c: 7, d: 1, a: 'O', q: '매슬로의 욕구단계설은 하위 단계가 충족되어야만 다음 상위 단계의 욕구가 동기로서 작용한다고 본다.', e: '생리, 안전, 사회, 존경, 자아실현 순으로 올라갑니다.' },
            { c: 7, d: 2, a: 'X', q: '매슬로 이론에서 가장 최고위 단계에 위치하며, 잠재력을 발휘하려는 욕구를 존경 욕구라고 한다.', e: '최고위 단계는 존경이 아닌 자아실현 욕구입니다.' },
            { c: 7, d: 2, a: 'O', q: '매슬로에 의하면, 이미 충분히 만족된 욕구는 더 이상 사람을 움직이는 동기 유발 요인이 되지 못한다.', e: '충족된 욕구는 동기 유발 기능을 상실합니다.' },
            { c: 7, d: 1, a: 'O', q: '맥그리거의 X이론은 인간이 본질적으로 일을 싫어하고 책임을 회피하려는 수동적 존재라고 가정한다.', e: '성악설에 가까운 전통적 통제 방식의 전제입니다.' },
            { c: 7, d: 2, a: 'X', q: '맥그리거의 Y이론을 믿는 관리자는 직원들에게 엄격한 처벌과 금전적 통제를 가하는 방식을 택할 것이다.', e: '처벌과 통제는 X이론적 방식입니다. Y이론은 자율성을 부여합니다.' },
            { c: 7, d: 2, a: 'O', q: '허즈버그의 동기-위생 이론은 불만을 없애는 요인과 만족을 주는 요인이 서로 완전히 별개의 차원이라고 보았다.', e: '불만의 반대가 만족이 아니라는 독특한 이원적 시각입니다.' },
            { c: 7, d: 3, a: 'X', q: '허즈버그 이론에서 작업 조건이나 급여는 작업자를 만족스럽게 만들어 열정을 높이는 동기 요인이다.', e: '급여와 환경은 불만을 줄여줄 뿐인 위생 요인입니다.' },
            { c: 7, d: 2, a: 'O', q: '허즈버그 이론에서 일 자체의 성취감, 인정, 책임감 등은 직무 만족을 직접 높이는 동기 요인이다.', e: '일 자체의 매력이 진짜 동기부여의 원천이라고 보았습니다.' },
            { c: 7, d: 3, a: 'O', q: '직원 월급을 올렸는데도 성과가 오르지 않는다면, 허즈버그 관점에서는 위생 요인만 충족되었기 때문이다.', e: '불만은 없어졌지만, 열정을 이끌어낼 동기 요인이 없기 때문입니다.' },
            { c: 7, d: 2, a: 'O', q: '브룸의 기대이론에서 기대감(Expectancy)은 내가 노력하면 목표한 성과를 낼 수 있을 것이라는 주관적 믿음이다.', e: '노력과 성과 사이의 연결 고리입니다.' },
            { c: 7, d: 2, a: 'O', q: '브룸의 이론에서 유의성(Valence)은 개인이 특정 보상에 대해 부여하는 주관적인 가치나 매력도를 뜻한다.', e: '나에게 그 보상이 얼마나 가치 있는가를 의미합니다.' },
            { c: 7, d: 2, a: 'O', q: '브룸의 이론에서 수단성(Instrumentality)은 높은 성과를 내면 반드시 약속된 보상이 주어질 것이라는 믿음이다.', e: '성과와 보상 사이의 연결 고리입니다.' },
            { c: 7, d: 3, a: 'O', q: '브룸의 이론에 따르면 기대감, 수단성, 유의성 중 하나라도 0이면 전체 동기는 0이 되어 행동하지 않는다.', e: '세 요소의 곱(E×I×V)으로 동기가 결정되기 때문입니다.' }
        ];

        function App() {
            const [gameState, setGameState] = useState('setup');
            const [selectedChapter, setSelectedChapter] = useState('all');
            const [selectedDifficulty, setSelectedDifficulty] = useState('all');
            const [selectedCount, setSelectedCount] = useState('30');
            const [quizList, setQuizList] = useState([]);
            const [currentIndex, setCurrentIndex] = useState(0);
            const [score, setScore] = useState(0);
            const [wrongAnswers, setWrongAnswers] = useState([]);
            const [startTime, setStartTime] = useState(null);
            const [endTime, setEndTime] = useState(null);
            const [userAnswer, setUserAnswer] = useState(null);
            const [isCorrect, setIsCorrect] = useState(null);
            const [showQuitModal, setShowQuitModal] = useState(false);

            const handleStart = (isRandom30 = false) => {
                let filtered = questionData;
                if (!isRandom30) {
                    if (selectedChapter !== 'all') filtered = filtered.filter(q => q.c.toString() === selectedChapter);
                    if (selectedDifficulty !== 'all') filtered = filtered.filter(q => q.d.toString() === selectedDifficulty);
                }
                const shuffled = [...filtered].sort(() => Math.random() - 0.5);
                const count = isRandom30 ? 30 : (selectedCount === 'all' ? shuffled.length : parseInt(selectedCount));
                setQuizList(shuffled.slice(0, Math.min(count, shuffled.length)));
                setCurrentIndex(0); setScore(0); setWrongAnswers([]); setUserAnswer(null); setStartTime(new Date()); setGameState('playing');
            };

            const handleAnswer = (ans) => {
                if (userAnswer !== null) return;
                const correct = ans === quizList[currentIndex].a;
                setUserAnswer(ans); setIsCorrect(correct);
                if (correct) setScore(s => s + 1);
                else setWrongAnswers(w => [...w, {...quizList[currentIndex], userAnswer: ans}]);
            };

            const handleNext = () => {
                if (currentIndex + 1 < quizList.length) { setCurrentIndex(i => i + 1); setUserAnswer(null); }
                else { setEndTime(new Date()); setGameState('result'); }
            };

            const confirmQuit = (quit) => {
                setShowQuitModal(false);
                if (quit) {
                    const answered = userAnswer !== null ? currentIndex + 1 : currentIndex;
                    if (answered === 0) setGameState('setup');
                    else { setQuizList(quizList.slice(0, answered)); setEndTime(new Date()); setGameState('result'); }
                }
            };

            const getTimeInfo = () => {
                if (!endTime) return "";
                const diff = Math.floor((endTime - startTime) / 1000);
                const m = Math.floor(diff / 60); const s = diff % 60;
                const days = ['일', '월', '화', '수', '목', '금', '토'];
                const timeStr = `${endTime.getFullYear()}년 ${endTime.getMonth()+1}월 ${endTime.getDate()}일 ${days[endTime.getDay()]}요일 ${endTime.getHours().toString().padStart(2,'0')}:${endTime.getMinutes().toString().padStart(2,'0')}`;
                return { duration: `${m > 0 ? m+'분 ' : ''}${s}초`, time: timeStr };
            };

            if (gameState === 'setup') return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <div className="bg-white max-w-lg w-full rounded-[2.5rem] shadow-2xl overflow-hidden border border-slate-200">
                        <div className="bg-blue-700 p-10 text-center text-white">
                            <div className="bg-blue-600/50 w-20 h-20 rounded-3xl mx-auto mb-6 flex items-center justify-center">
                                <Icon name="book-open" className="w-10 h-10" />
                            </div>
                            <h1 className="text-3xl font-black mb-2 tracking-tight">행정학개론 150제 마스터</h1>
                            <p className="text-blue-100 font-medium">중간고사 A+를 위한 필승 전략</p>
                        </div>
                        <div className="p-10 space-y-6">
                            <div className="space-y-4">
                                <div>
                                    <label className="text-xs font-black text-slate-400 uppercase tracking-widest ml-1">공략 단원</label>
                                    <select className="w-full mt-1.5 p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold focus:border-blue-500 outline-none transition-all appearance-none" value={selectedChapter} onChange={e => setSelectedChapter(e.target.value)}>
                                        <option value="all">전체 단원 혼합 모의고사</option>
                                        {Object.entries(chapters).map(([k, v]) => <option key={k} value={k}>{v}</option>)}
                                    </select>
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div>
                                        <label className="text-xs font-black text-slate-400 uppercase tracking-widest ml-1">난이도</label>
                                        <select className="w-full mt-1.5 p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold focus:border-blue-500 outline-none transition-all appearance-none" value={selectedDifficulty} onChange={e => setSelectedDifficulty(e.target.value)}>
                                            <option value="all">모든 난이도</option>
                                            <option value="3">상 (심화)</option>
                                            <option value="2">중 (핵심)</option>
                                            <option value="1">하 (기초)</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label className="text-xs font-black text-slate-400 uppercase tracking-widest ml-1">문항 수</label>
                                        <select className="w-full mt-1.5 p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold focus:border-blue-500 outline-none transition-all appearance-none" value={selectedCount} onChange={e => setSelectedCount(e.target.value)}>
                                            <option value="10">10문제</option>
                                            <option value="30">30문제</option>
                                            <option value="50">50문제</option>
                                            <option value="all">전체(150제)</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            <div className="pt-4 space-y-3">
                                <button onClick={() => handleStart(false)} className="w-full py-5 bg-blue-600 text-white font-black rounded-2xl shadow-xl shadow-blue-200 hover:bg-blue-700 active:scale-95 transition-all text-lg">테스트 시작</button>
                                <button onClick={() => handleStart(true)} className="w-full py-4 bg-slate-100 text-slate-500 font-bold rounded-2xl hover:bg-slate-200 active:scale-95 transition-all">랜덤 30제 바로시작</button>
                            </div>
                        </div>
                    </div>
                </div>
            );

            if (gameState === 'playing') return (
                <div className="min-h-screen p-4 md:p-8 flex flex-col items-center">
                    <div className="max-w-2xl w-full">
                        <div className="flex justify-between items-center mb-6">
                            <button onClick={() => setShowQuitModal(true)} className="bg-white px-5 py-2.5 rounded-2xl shadow-md font-bold text-slate-500 flex items-center hover:text-red-500 transition-colors border border-slate-100">
                                <Icon name="home" className="w-4 h-4 mr-2" /> 중단 및 결과보기
                            </button>
                            <div className="bg-blue-600 text-white px-6 py-2.5 rounded-2xl font-black shadow-lg shadow-blue-100">
                                {currentIndex + 1} / {quizList.length}
                            </div>
                        </div>
                        
                        <div className="bg-white rounded-[3rem] shadow-2xl overflow-hidden border border-slate-100 animate-fade-in">
                            <div className="bg-slate-50 px-8 py-4 border-b border-slate-100 flex justify-between items-center">
                                <span className="text-xs font-black text-slate-400 tracking-tighter uppercase">{chapters[quizList[currentIndex].c]}</span>
                                <span className="bg-white px-3 py-1 rounded-full text-[10px] font-black text-blue-500 border border-blue-100 shadow-sm">LV. {diffs[quizList[currentIndex].d]}</span>
                            </div>
                            
                            <div className="p-10 md:p-14">
                                <h2 className="text-2xl md:text-3xl font-black mb-14 leading-tight text-slate-800 tracking-tight">
                                    <span className="text-blue-600 mr-2 text-4xl font-black">Q.</span>
                                    {quizList[currentIndex].q}
                                </h2>
                                
                                <div className="grid grid-cols-2 gap-6 mb-10">
                                    <button onClick={() => handleAnswer('O')} disabled={userAnswer !== null} className={`ox-btn py-12 rounded-[2.5rem] text-7xl font-black border-4 transition-all shadow-sm ${userAnswer === 'O' ? (isCorrect ? 'bg-blue-600 border-blue-600 text-white shadow-blue-200' : 'bg-red-500 border-red-500 text-white shadow-red-200') : 'bg-white border-slate-100 text-blue-500 hover:border-blue-500'}`}>O</button>
                                    <button onClick={() => handleAnswer('X')} disabled={userAnswer !== null} className={`ox-btn py-12 rounded-[2.5rem] text-7xl font-black border-4 transition-all shadow-sm ${userAnswer === 'X' ? (isCorrect ? 'bg-blue-600 border-blue-600 text-white shadow-blue-200' : 'bg-red-500 border-red-500 text-white shadow-red-200') : 'bg-white border-slate-100 text-red-500 hover:border-red-500'}`}>X</button>
                                </div>
                                
                                {userAnswer && (
                                    <div className={`p-8 rounded-[2rem] animate-fade-in border-2 ${isCorrect ? 'bg-green-50 border-green-100 text-green-800' : 'bg-red-50 border-red-100 text-red-800'}`}>
                                        <div className="flex items-center mb-3">
                                            <Icon name={isCorrect ? "check-circle-2" : "x-circle"} className={`w-6 h-6 mr-2 ${isCorrect ? 'text-green-600' : 'text-red-600'}`} />
                                            <span className="text-lg font-black">{isCorrect ? '정답입니다!' : `오답! 정답은 ${quizList[currentIndex].a}`}</span>
                                        </div>
                                        <p className="font-bold opacity-90 leading-relaxed text-sm md:text-base"><span className="text-blue-600 font-black mr-2">교수님 해설</span>{quizList[currentIndex].e}</p>
                                        <button onClick={handleNext} className="w-full mt-8 py-5 bg-slate-800 text-white font-black rounded-2xl hover:bg-black transition-all shadow-lg">다음 문제로 ➔</button>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                    
                    {showQuitModal && (
                        <div className="fixed inset-0 modal-bg flex items-center justify-center p-4 z-50">
                            <div className="bg-white p-10 rounded-[2.5rem] max-w-sm w-full text-center shadow-2xl animate-fade-in border border-slate-100">
                                <Icon name="alert-triangle" className="w-16 h-16 text-yellow-400 mx-auto mb-6" />
                                <h3 className="text-2xl font-black mb-3">학습을 중단할까요?</h3>
                                <p className="mb-8 text-slate-500 font-bold leading-snug text-sm">지금까지 완료한 문제를 바탕으로<br/>결과 리포트를 생성해 드릴게요.</p>
                                <div className="flex gap-3">
                                    <button onClick={() => confirmQuit(false)} className="flex-1 py-4 bg-slate-100 rounded-2xl font-black text-slate-400 hover:bg-slate-200 transition-all">계속하기</button>
                                    <button onClick={() => confirmQuit(true)} className="flex-1 py-4 bg-blue-600 text-white rounded-2xl font-black shadow-lg shadow-blue-100 hover:bg-blue-700 transition-all">결과보기</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );

            if (gameState === 'result') {
                const time = getTimeInfo();
                return (
                    <div className="min-h-screen p-4 md:p-8 flex flex-col items-center">
                        <div className="max-w-3xl w-full space-y-6">
                            <div className="bg-white rounded-[3rem] shadow-2xl overflow-hidden text-center p-12 border border-slate-200">
                                <div className="bg-yellow-100 w-24 h-24 rounded-[2rem] mx-auto mb-8 flex items-center justify-center">
                                    <Icon name="award" className="w-12 h-12 text-yellow-600" />
                                </div>
                                <h1 className="text-3xl font-black text-slate-800 mb-2 tracking-tight">테스트 완료 리포트</h1>
                                <div className="text-7xl font-black text-blue-600 my-10 tracking-tighter">
                                    {Math.round((score/quizList.length)*100)}<span className="text-3xl ml-1 text-slate-300 font-black">점</span>
                                </div>
                                
                                <div className="grid grid-cols-3 gap-4 mb-10">
                                    <div className="bg-slate-50 p-5 rounded-[1.5rem] border border-slate-100">
                                        <p className="text-[10px] font-black text-slate-400 mb-1">정답수</p>
                                        <p className="text-2xl font-black text-green-600">{score}</p>
                                    </div>
                                    <div className="bg-slate-50 p-5 rounded-[1.5rem] border border-slate-100">
                                        <p className="text-[10px] font-black text-slate-400 mb-1">오답수</p>
                                        <p className="text-2xl font-black text-red-500">{wrongAnswers.length}</p>
                                    </div>
                                    <div className="bg-slate-50 p-5 rounded-[1.5rem] border border-slate-100">
                                        <p className="text-[10px] font-black text-slate-400 mb-1">소요시간</p>
                                        <p className="text-lg font-black text-slate-700 leading-tight py-1">{time.duration}</p>
                                    </div>
                                </div>

                                <p className="text-xs font-bold text-slate-400 mb-8 flex items-center justify-center">
                                    <Icon name="calendar" className="w-3 h-3 mr-1" /> {time.time} 종료
                                </p>
                                
                                <button onClick={() => setGameState('setup')} className="w-full py-5 bg-blue-600 text-white font-black rounded-2xl shadow-xl shadow-blue-100 hover:bg-blue-700 transition-all text-lg">다시 도전하기</button>
                            </div>

                            {wrongAnswers.length > 0 && (
                                <div className="bg-white rounded-[3rem] shadow-xl p-10 border border-slate-200">
                                    <div className="flex items-center mb-10">
                                        <Icon name="book-x" className="w-8 h-8 text-red-500 mr-3" />
                                        <h2 className="text-2xl font-black text-slate-800 tracking-tight">취약점 보완 오답노트</h2>
                                    </div>
                                    <div className="space-y-6">
                                        {wrongAnswers.map((w, i) => (
                                            <div key={i} className="bg-slate-50 p-8 rounded-[2rem] border border-slate-100 shadow-sm">
                                                <div className="flex items-center gap-2 mb-4">
                                                    <span className="bg-red-100 text-red-600 text-[10px] font-black px-3 py-1 rounded-full border border-red-200">오답</span>
                                                    <span className="text-[10px] font-black text-slate-400">{chapters[w.c]}</span>
                                                </div>
                                                <p className="font-black text-slate-800 text-lg mb-6 leading-snug">Q. {w.q}</p>
                                                <div className="text-sm font-bold text-blue-600 bg-white p-6 rounded-2xl shadow-sm border border-blue-100 leading-relaxed">
                                                    <span className="bg-blue-600 text-white text-[10px] px-2 py-0.5 rounded mr-2">교수님 해설</span>
                                                    {w.e}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                );
            }
            return null;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
